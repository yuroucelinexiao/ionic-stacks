  parent = "sectors"
  weight = 2

# 1.3 Power-to-X (PtX)
[[main]]
  name = "Power-to-X"
  pageRef = "tech/sectors/ptx"
  parent = "sectors"
  weight = 3

# 1.4 Minerals
[[main]]
  name = "Minerals"
  pageRef = "tech/sectors/minerals"
  parent = "sectors"
  weight = 4

# 2.0 Technical Index
[[main]]
  name = 'Tech Index'
